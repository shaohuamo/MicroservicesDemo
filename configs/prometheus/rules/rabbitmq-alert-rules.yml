groups:
  - name: rabbitmq-alerts
    rules:
      - alert: RabbitMQQueueBlocked
        expr: rabbitmq_queue_messages_ready > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "RabbitMQ queue blocked"
          description: "Queue {{ $labels.queue }} has messages blocked"
      - alert: RabbitMQNoConsumers
        expr: rabbitmq_queue_consumers == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RabbitMQ queue has no consumers"
          description: "Queue {{ $labels.queue }} has no consumers"