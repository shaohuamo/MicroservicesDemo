name: CI - Products Microservice

on:
  push:
    branches:
      - master
    paths:
      - 'src/backend/Services/Products/**'
      - 'src/backend/BuildingBlocks/**'
      - 'tests/ProductsServiceUnitTests/**'
      - '.github/workflows/ci-products.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'src/backend/Services/Products/**'
      - 'src/backend/BuildingBlocks/**'
      - 'tests/ProductsServiceUnitTests/**'
      - '.github/workflows/ci-products.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/productmicroservice

jobs:
  test-and-build:
    name: Test, Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run unit tests
        run: dotnet test tests/ProductsServiceUnitTests/ProductsServiceUnitTests.csproj --configuration Release --verbosity normal

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/Services/Products/ProductsMicroService.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
