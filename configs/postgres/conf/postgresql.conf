listen_addresses = '*'
port = 5432

logging_collector = off
log_destination = 'stderr'

log_min_duration_statement = 1000 # Log query that take more than 1000 ms (1 second)
log_line_prefix = '%t [%p]: user=%u db=%d ' #log format

shared_preload_libraries = 'pg_stat_statements'

track_io_timing = on
track_functions = all