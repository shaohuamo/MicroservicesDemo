global:
  scrape_interval:     10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
rule_files:
  - rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
  - job_name: otel-app-metrics
    static_configs:
      - targets:
          - otel-collector:8889
  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692
  - job_name: postgres
    static_configs:
      - targets: 
          - postgres-exporter:9187
  - job_name: redis
    static_configs:
      - targets: 
          - redis-exporter:9121