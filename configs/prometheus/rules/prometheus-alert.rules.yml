groups:
  - name: postgres-alerts
    rules:

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Postgres is down"
          description: "Database is not reachable"

      - alert: PostgresLongRunningQuery
        expr: pg_stat_activity_max_tx_duration > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow query detected"
          description: "Query running longer than 30 seconds"

      - alert: PostgresIdleTransaction
        expr: pg_stat_activity_max_tx_duration{state="idle in transaction"} > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Idle transaction detected"
          description: "Transaction open too long"

      - alert: PostgresHighConnections
        expr: sum(pg_stat_activity_count) / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High DB connections"
          description: "Connections exceed 80%"