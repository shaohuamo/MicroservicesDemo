pg_stat_activity:
  query: |
    SELECT
      datname,
      state,
      COUNT(*) AS count,
      MAX(COALESCE(EXTRACT(EPOCH FROM (now() - xact_start)), 0)) AS max_tx_duration
    FROM pg_stat_activity
    WHERE datname IS NOT NULL
    GROUP BY datname,state;
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - state:
        usage: "LABEL"
        description: "Connection state"
    - count:
        usage: "GAUGE"
        description: "Number of connections by state"
    - max_tx_duration:
        usage: "GAUGE"
        description: "Max transaction duration in seconds"

pg_settings_max_connections:
  query: |
    SELECT setting::int AS max_connections
    FROM pg_settings
    WHERE name = 'max_connections';
  metrics:
    - max_connections:
        usage: "GAUGE"
        description: "Maximum allowed connections"